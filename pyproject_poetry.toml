[tool.poetry]
name = "siege-utilities"
version = "1.0.0"
description = "A comprehensive Python utilities package with enhanced auto-discovery"
authors = ["Dheeraj Chand <dheeraj@siegeanalytics.com>"]
readme = "README.md"
packages = [{include = "siege_utilities"}]

[tool.poetry.dependencies]
python = ">=3.8"
"requests>=2.28.0"
"tqdm>=4.60.0"
"pandas>=1.5.0"
"numpy>=1.21.0"
"pyyaml>=6.0"
"beautifulsoup4>=4.12.0"
"lxml>=4.9.0"

[tool.poetry.group.dev.dependencies]
"pytest>=7.0.0"
"pytest-cov>=4.0.0"
"pytest-mock>=3.10.0"
"pytest-xdist>=3.0.0"
"pytest-html>=3.1.0"
"pytest-json-report>=1.5.0"
"pytest-forked>=1.4.0"
"black>=21.0.0"
"flake8>=3.8.0"
"astor>=0.8.1"

[tool.poetry.urls]
Homepage = "https://github.com/siege-analytics/siege_utilities"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
