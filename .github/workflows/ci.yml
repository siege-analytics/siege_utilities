name: Siege Utilities CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'dheerajchand/**'
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4

    - name: Install system geospatial libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          gdal-bin libgdal-dev libgeos-dev libproj-dev

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --extra all --extra dev

    - name: Lint with flake8
      run: |
        uv run flake8 siege_utilities --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 siege_utilities --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        uv run pytest tests/ -v --cov=siege_utilities --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-pydantic-v1:
    runs-on: ubuntu-latest
    name: "pydantic v1 compat"

    steps:
    - uses: actions/checkout@v4

    - name: Install system geospatial libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          gdal-bin libgdal-dev libgeos-dev libproj-dev

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install with pydantic v1
      run: |
        uv sync --extra all --extra dev
        uv pip install 'pydantic>=1.10,<2.0' --force-reinstall

    - name: Test pydantic v1 compatibility
      run: |
        uv run pytest tests/test_pydantic_v1_compat.py -v --no-cov

  test-core:
    runs-on: ubuntu-latest
    name: "core-only (no heavy deps)"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install core + dev only
      run: |
        uv sync --extra dev

    - name: Verify core import works
      run: |
        uv run python -c "import siege_utilities; print(siege_utilities.__version__)"

    - name: Test core modules
      run: |
        uv run pytest tests/test_backward_compat.py tests/test_pydantic_v1_compat.py tests/test_sql_safety.py -v --no-cov

  test-geo-no-gdal:
    runs-on: ubuntu-latest
    name: "geo without GDAL"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install data + geo + dev (no GDAL system libs)
      run: |
        uv sync --extra data --extra geo --extra dev --extra config-extras --extra web

    - name: Test geo without GDAL
      run: |
        uv run pytest tests/ -v --no-cov \
          --ignore=tests/test_nces_service.py \
          --ignore=tests/test_nces_download.py \
          --ignore=tests/test_chart_generator.py \
          --ignore=tests/test_choropleth.py \
          --ignore=tests/test_boundary_manager.py \
          --ignore=tests/test_temporal_boundary.py \
          --ignore=tests/test_urbanicity_service.py \
          --ignore=tests/test_timeseries_rollup_services.py \
          --ignore=tests/test_credential_manager.py

  test-smoke:
    runs-on: ubuntu-latest
    name: "smoke tests (fast, no GDAL)"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install core + geo + dev
      run: |
        uv sync --extra data --extra geo --extra dev --extra config-extras --extra web

    - name: Run smoke tests
      run: |
        uv run pytest tests/test_smoke.py -v --no-cov

  test-databricks:
    runs-on: ubuntu-latest
    name: "databricks SDK tests"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install with databricks extras
      run: |
        uv sync --extra databricks --extra data --extra geo --extra dev

    - name: Run databricks tests
      run: |
        uv run pytest tests/test_databricks_auth_session_secrets.py tests/test_databricks_dataframe_bridge.py tests/test_databricks_lakebase_unity.py tests/test_databricks_fallback.py -v --no-cov

  battle-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --extra all --extra dev

    - name: Run Battle Testing Suite
      run: |
        # Run our comprehensive battle testing system
        chmod +x scripts/run_overnight_comprehensive.sh
        timeout 1800 scripts/run_overnight_comprehensive.sh || true

    - name: Upload Battle Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: battle-test-results
        path: overnight_results/
        retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [test, battle-test]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Verify version consistency
      run: |
        python scripts/release_manager.py --check

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  release:
    runs-on: ubuntu-latest
    needs: [test, battle-test, build]
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Verify version consistency
      run: |
        python scripts/release_manager.py --check

    - name: Verify release tag matches package version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PKG_VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "ERROR: Release tag v${TAG_VERSION} does not match package version ${PKG_VERSION}"
          exit 1
        fi
        echo "Tag v${TAG_VERSION} matches package version ${PKG_VERSION}"

    - name: Install twine
      run: pip install twine

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit bandit

    - name: Run pip-audit vulnerability check
      run: |
        pip-audit --format json --output pip-audit-report.json || true

    - name: Run bandit security linter
      run: |
        bandit -r siege_utilities/ -f json -o bandit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          pip-audit-report.json
          bandit-report.json
        retention-days: 30

  documentation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Check for Sphinx setup
      id: check_sphinx
      run: |
        if [ -f "docs/conf.py" ]; then
          echo "sphinx_ready=true" >> $GITHUB_OUTPUT
        else
          echo "sphinx_ready=false" >> $GITHUB_OUTPUT
          echo "No Sphinx configuration found (docs/conf.py missing)"
        fi

    - name: Install dependencies
      if: steps.check_sphinx.outputs.sphinx_ready == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme

    - name: Build documentation
      if: steps.check_sphinx.outputs.sphinx_ready == 'true'
      run: |
        cd docs
        make html

    - name: Deploy documentation
      if: steps.check_sphinx.outputs.sphinx_ready == 'true'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build/html
