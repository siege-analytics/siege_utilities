name: Siege Utilities CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'dheerajchand/**'
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

jobs:
  test-file-hygiene:
    runs-on: ubuntu-latest
    name: "test file hygiene"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Validate test filename/location conventions
      run: |
        python scripts/check_test_file_hygiene.py

  lint-ratchet-phase1:
    runs-on: ubuntu-latest
    name: "lint ratchet phase1"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8

    - name: Enforce phase 1 lint ratchet on touched Python files
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        python scripts/check_lint_ratchet_phase1.py \
          --base-sha "${BASE_SHA}" \
          --head-sha "${HEAD_SHA}"

  lint-ratchet-phase2-4:
    runs-on: ubuntu-latest
    name: "lint ratchet phases2-4"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8

    - name: Enforce phase 2 (touched files)
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        python scripts/check_lint_ratchet.py \
          --phase phase2 \
          --base-sha "${BASE_SHA}" \
          --head-sha "${HEAD_SHA}"

    - name: Enforce phase 3 (full-module on touched high-change domains)
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        python scripts/check_lint_ratchet.py \
          --phase phase3 \
          --base-sha "${BASE_SHA}" \
          --head-sha "${HEAD_SHA}"

    - name: Enforce phase 4 (full-repo ratchet baseline gate)
      run: |
        python scripts/check_lint_ratchet.py --phase phase4

  test:
    runs-on: ubuntu-latest
    # Allow 3.13 to fail without blocking PRs while we stabilize
    continue-on-error: ${{ matrix.python-version == '3.13' }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install system geospatial libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          gdal-bin libgdal-dev libgeos-dev libproj-dev

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --extra all --extra dev

    - name: Lint with flake8
      run: |
        uv run flake8 siege_utilities --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 siege_utilities --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        uv run pytest tests/ -v --cov=siege_utilities --cov-report=xml \
          --ignore=tests/test_notebooks.py \
          --ignore=tests/test_django_temporal_models_orm.py
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-pydantic-v1:
    runs-on: ubuntu-latest
    name: "pydantic v1 compat"

    steps:
    - uses: actions/checkout@v4

    - name: Install system geospatial libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          gdal-bin libgdal-dev libgeos-dev libproj-dev

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install with pydantic v1
      run: |
        uv sync --extra all --extra dev
        uv pip install 'pydantic>=1.10,<2.0' --force-reinstall

    - name: Test pydantic v1 compatibility
      run: |
        uv run pytest tests/test_pydantic_v1_compat.py -v --no-cov

  test-core:
    runs-on: ubuntu-latest
    name: "core-only (no heavy deps)"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install core + dev only
      run: |
        uv sync --extra dev

    - name: Verify core import works
      run: |
        uv run python -c "import siege_utilities; print(siege_utilities.__version__)"

    - name: Test core modules
      run: |
        uv run pytest tests/test_backward_compat.py tests/test_pydantic_v1_compat.py tests/test_sql_safety.py -v --no-cov

  api-contract-regression:
    runs-on: ubuntu-latest
    name: "api contract regression"

    env:
      BASELINE_VERSION: "3.13.1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Infer release impact from version delta
      id: impact
      run: |
        IMPACT=$(python scripts/release_manager.py --infer-impact --baseline-version "${BASELINE_VERSION}")
        echo "level=${IMPACT}" >> $GITHUB_OUTPUT
        echo "Inferred release impact: ${IMPACT} (baseline ${BASELINE_VERSION} → candidate $(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))"))"

    - name: Build baseline and candidate API contracts
      run: |
        set -euo pipefail

        python -m venv .venv_baseline
        .venv_baseline/bin/python -m pip install --upgrade pip
        .venv_baseline/bin/pip install "siege-utilities==${BASELINE_VERSION}"
        .venv_baseline/bin/python scripts/contracts/generate_public_api_contract.py \
          --output /tmp/contract_baseline.json

        python -m venv .venv_candidate
        .venv_candidate/bin/python -m pip install --upgrade pip
        .venv_candidate/bin/pip install -e .
        .venv_candidate/bin/python scripts/contracts/generate_public_api_contract.py \
          --output /tmp/contract_candidate.json

    - name: Compare API contracts
      run: |
        python scripts/contracts/compare_public_api_contracts.py \
          --baseline /tmp/contract_baseline.json \
          --candidate /tmp/contract_candidate.json \
          --release-impact "${{ steps.impact.outputs.level }}" \
          --allowlist scripts/contracts/contract_allowlist.json

  test-geo-no-gdal:
    runs-on: ubuntu-latest
    name: "geo without GDAL"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install data + geo + dev (no GDAL system libs)
      run: |
        uv sync --extra data --extra geo --extra dev --extra config-extras --extra web

    - name: Test geo without GDAL
      run: |
        uv run pytest tests/ -v --no-cov \
          --ignore=tests/test_nces_service.py \
          --ignore=tests/test_nces_download.py \
          --ignore=tests/test_chart_generator.py \
          --ignore=tests/test_choropleth.py \
          --ignore=tests/test_boundary_manager.py \
          --ignore=tests/test_temporal_boundary.py \
          --ignore=tests/test_urbanicity_service.py \
          --ignore=tests/test_timeseries_rollup_services.py \
          --ignore=tests/test_credential_manager.py \
          --ignore=tests/test_google_account.py \
          --ignore=tests/test_google_analytics_connector.py \
          --ignore=tests/test_google_workspace.py \
          --ignore=tests/test_redistricting_models.py \
          --ignore=tests/test_notebooks.py \
          --ignore=tests/test_django_temporal_models_orm.py \
          --ignore=tests/test_dataframe_engine_spatial.py

  test-smoke:
    runs-on: ubuntu-latest
    name: "smoke tests (fast, no GDAL)"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install core + geo + dev
      run: |
        uv sync --extra data --extra geo --extra dev --extra config-extras --extra web

    - name: Run smoke tests
      run: |
        uv run pytest tests/test_smoke.py -v --no-cov

  test-databricks:
    runs-on: ubuntu-latest
    name: "databricks SDK tests"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install with databricks extras
      run: |
        uv sync --extra databricks --extra data --extra geo --extra dev

    - name: Run databricks tests
      run: |
        uv run pytest tests/test_databricks_auth_session_secrets.py tests/test_databricks_dataframe_bridge.py tests/test_databricks_lakebase_unity.py tests/test_databricks_fallback.py tests/test_databricks_download_dir.py -v --no-cov

  battle-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync --extra all --extra dev

    - name: Run Battle Testing Suite
      run: |
        # Run our comprehensive battle testing system
        chmod +x scripts/run_overnight_comprehensive.sh
        timeout 1800 scripts/run_overnight_comprehensive.sh || true

    - name: Upload Battle Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: battle-test-results
        path: overnight_results/
        retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [test, battle-test, api-contract-regression]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Verify version consistency
      run: |
        python scripts/release_manager.py --check

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  release:
    runs-on: ubuntu-latest
    needs: [test, battle-test, api-contract-regression, build]
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Verify version consistency
      run: |
        python scripts/release_manager.py --check

    - name: Verify release tag matches package version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PKG_VERSION=$(python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()).group(1))")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "ERROR: Release tag v${TAG_VERSION} does not match package version ${PKG_VERSION}"
          exit 1
        fi
        echo "Tag v${TAG_VERSION} matches package version ${PKG_VERSION}"

    - name: Install twine
      run: pip install twine

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit bandit

    - name: Run pip-audit vulnerability check
      run: |
        pip-audit --format json --output pip-audit-report.json || true

    - name: Run bandit security linter
      run: |
        bandit -r siege_utilities/ -f json -o bandit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          pip-audit-report.json
          bandit-report.json
        retention-days: 30

  documentation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Check for Sphinx setup
      id: check_sphinx
      run: |
        if [ -f "docs/conf.py" ]; then
          echo "sphinx_ready=true" >> $GITHUB_OUTPUT
        else
          echo "sphinx_ready=false" >> $GITHUB_OUTPUT
          echo "No Sphinx configuration found (docs/conf.py missing)"
        fi

    - name: Install dependencies
      if: steps.check_sphinx.outputs.sphinx_ready == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme

    - name: Build documentation
      if: steps.check_sphinx.outputs.sphinx_ready == 'true'
      run: |
        cd docs
        make html

    - name: Deploy documentation
      if: steps.check_sphinx.outputs.sphinx_ready == 'true'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build/html
