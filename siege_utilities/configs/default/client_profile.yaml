# Branding Configuration
branding_config:
  primary_color: "#1f77b4"
  secondary_color: "#ff7f0e"
  accent_color: "#2ca02c"
  text_color: "#000000"
  background_color: "#ffffff"
  primary_font: "Arial"
  secondary_font: "Arial"
  logo_path: null
  logo_width: null
  logo_height: null
  header_height: 40
  footer_height: 20
  margin_top: 20
  margin_bottom: 20
  margin_left: 20
  margin_right: 20
